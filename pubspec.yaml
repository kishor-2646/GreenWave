name: green_wave
description: "A new Flutter project for intelligent traffic management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Latest Major Versions (Fixes Pigeon cast error)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  provider: ^6.1.1
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  http: ^1.2.0
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env